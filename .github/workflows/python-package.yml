name: Python package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest coverage pytest-cov
        pip install -e ".[all]"

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Full lint check
        flake8 . --count --statistics

    - name: Run tests
      run: |
        pytest --cov=zat zat

  coverage-badge:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest coverage pytest-cov
        pip install -e ".[all]"

    - name: Generate coverage report
      run: |
        pytest --cov=zat zat
        coverage json

    - name: Generate coverage badge
      run: |
        python -c "
        import json
        with open('coverage.json') as f:
            pct = int(json.load(f)['totals']['percent_covered_display'].split('.')[0])
        if pct >= 90: color = 'brightgreen'
        elif pct >= 80: color = 'green'
        elif pct >= 70: color = 'yellowgreen'
        elif pct >= 60: color = 'yellow'
        else: color = 'red'
        import urllib.request
        url = f'https://img.shields.io/badge/coverage-{pct}%25-{color}'
        urllib.request.urlretrieve(url, 'coverage.svg')
        print(f'Coverage: {pct}% ({color})')
        "

    - name: Commit coverage badge
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add coverage.svg
        git diff --staged --quiet || git commit -m "Update coverage badge"
        git push
